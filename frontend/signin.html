<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — JobUnify</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="signup.css"/>
  <style>
    /* Signin specific overrides */
    .page-wrapper { max-width: 500px; }
    .form-panel { padding: 44px 40px; }
    .auth-icon { font-size: 40px; text-align: center; margin-bottom: 12px; }
    .form-panel h1 { text-align: center; font-size: 24px; }
    .form-subtitle { text-align: center; margin-bottom: 32px; }
    .label-row { display: flex; justify-content: space-between; align-items: center; }
    .forgot-link { font-size: 12px; color: var(--accent2); text-decoration: none; font-weight: 500; }
    .forgot-link:hover { text-decoration: underline; }
    .bottom-link { text-align: center; font-size: 13px; color: var(--muted); margin-top: 20px; }
    .bottom-link a { color: var(--accent2); font-weight: 600; text-decoration: none; }
    .bottom-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Job<span>Unify</span></a>
    <div class="nav-right">New here? <a href="signup.html">Create account</a></div>
  </nav>

  <div class="page-wrapper">
    <div class="form-panel">

      <div class="auth-icon">👋</div>
      <h1>Welcome back</h1>
      <p class="form-subtitle">Sign in to continue your job search</p>

      <button class="google-btn" onclick="handleGoogle()" style="margin-bottom:20px">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google"/>
        Continue with Google
      </button>

      <div class="divider"><span>or sign in with email</span></div>

      <div class="form-group">
        <label>Email Address <span class="required">*</span></label>
        <input type="email" id="email" placeholder="shivang@email.com" />
        <span class="error-msg" id="emailError"></span>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>Password <span class="required">*</span></label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Enter your password" />
          <button class="toggle-eye" onclick="togglePassword('password', this)">👁</button>
        </div>
        <span class="error-msg" id="passwordError"></span>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="remember" />
        <label for="remember">Remember me for 30 days</label>
      </div>

      <button class="register-btn" onclick="handleSignin()">Sign In</button>

      <p class="bottom-link">Don't have an account? <a href="signup.html">Sign up free</a></p>

    </div>
  </div>

  <script src="signin.js"></script>
</body>
</html>
