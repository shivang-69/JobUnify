<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saved Jobs — JobUnify</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .page-desc {
      color: var(--muted);
      margin-bottom: 30px;
      font-size: 15px;
    }
    .saved-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      min-height: 70vh;
    }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      background: var(--panel-bg);
      border: 1px dashed rgba(108, 99, 255, 0.2);
      border-radius: 16px;
      max-width: 500px;
      margin: 40px auto;
    }
    .empty-state h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .empty-state p {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 14px;
    }
    .empty-state button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .empty-state button:hover {
      background: #5b54db;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">Job<span>Unify</span></div>
    <div class="nav-links">
      <a href="signup.html" id="signupNavBtn"><button class="nav-btn">Sign Up Free</button></a>
      <div class="avatar-wrap" id="avatarWrap" style="display:none">
        <div class="avatar" id="avatarBtn" onclick="toggleDropdown(event)" title="Open menu">S</div>

        <!-- PROFILE DROPDOWN -->
        <div class="profile-dropdown" id="profileDropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar-header" id="sidebar-avatar">S</div>
            <div class="user-text-details">
              <div class="dropdown-username-header" id="sidebar-name">User</div>
              <div class="dropdown-completion-header">
                Profile <span id="profile-completion-bar">0%</span> complete
              </div>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <nav class="dropdown-menu">
            <a href="profile.html" class="dropdown-item">
              <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <span>Profile</span>
            </a>
            <a href="saved-jobs.html" class="dropdown-item active">
              <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
              <span>Saved Jobs</span>
            </a>
            <a href="settings.html" class="dropdown-item">
              <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
              <span>Settings</span>
            </a>
          </nav>

          <div class="dropdown-divider"></div>

          <a href="#" onclick="logout(event)" class="dropdown-item dropdown-signout">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            <span>Sign out</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- SAVED CONTAINER -->
  <div class="saved-container">
    <div class="page-title">Saved Jobs</div>
    <div class="page-desc">Manage and keep track of all your bookmarked roles.</div>

    <!-- Search & Info Bar -->
    <div class="stats-bar" style="margin-bottom: 24px;">
      <div style="flex-grow: 1;"></div>
      <input type="text" id="searchInput" placeholder="Search saved jobs..." style="background:var(--card-bg); border:1px solid var(--border); border-radius:8px; padding:8px 16px; color:#fff; font-family:'Inter',sans-serif; width: 250px; outline:none; transition:border-color 0.2s;" oninput="filterSavedJobs()"/>
    </div>

    <!-- Job Grid -->
    <div class="job-grid" id="jobGrid">
      <!-- Dynamic list -->
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    let savedJobs = [];

    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem("jobunify_token");
      if (!token) {
        window.location.href = "signin.html";
        return;
      }

      setupUserSidebar();
      loadSavedJobs();
    });

    async function setupUserSidebar() {
      const userStr = localStorage.getItem("jobunify_user");
      if (userStr) {
        const user = JSON.parse(userStr);
        document.getElementById("signupNavBtn").style.display = "none";
        document.getElementById("avatarWrap").style.display = "block";

        const initial = (user.name || "U")[0].toUpperCase();
        document.getElementById("avatarBtn").textContent = initial;
        document.getElementById("sidebar-avatar").textContent = initial;
        document.getElementById("sidebar-name").textContent = user.name || "User";
        
        const completion = user.profileCompletion || 0;
        document.getElementById("profile-completion-bar").textContent = `${completion}%`;
      }
      
      // Async Sync
      const token = localStorage.getItem("jobunify_token");
      if (!token) return;
      try {
        const res = await fetch(`${API_BASE_URL}/api/profile`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success && data.user) {
          const userObj = {
            id: data.user.id,
            name: data.user.name,
            email: data.user.email,
            profileCompletion: data.user.profileCompletion || 0
          };
          localStorage.setItem("jobunify_user", JSON.stringify(userObj));
          
          document.getElementById("profile-completion-bar").textContent = `${userObj.profileCompletion}%`;
          const initial = (userObj.name || "U")[0].toUpperCase();
          document.getElementById("avatarBtn").textContent = initial;
          document.getElementById("sidebar-avatar").textContent = initial;
          document.getElementById("sidebar-name").textContent = userObj.name || "User";
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function loadSavedJobs() {
      const token = localStorage.getItem("jobunify_token");
      const grid = document.getElementById("jobGrid");

      try {
        const res = await fetch(`${API_BASE_URL}/api/saved`, {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });
        const data = await res.json();
        
        if (data.success) {
          savedJobs = data.jobs || [];
          renderSavedJobs(savedJobs);
        } else {
          grid.innerHTML = `<div class="empty-state"><h3>Failed to load</h3><p>${data.message}</p></div>`;
        }
      } catch (err) {
        console.error(err);
        grid.innerHTML = `<div class="empty-state"><h3>Connection Error</h3><p>Could not connect to the backend server.</p></div>`;
      }
    }

    function renderSavedJobs(jobs) {
      const grid = document.getElementById("jobGrid");
      const countEl = document.getElementById("jobCount");
      if (countEl) {
        countEl.textContent = `${jobs.length} jobs saved`;
      }

      if (jobs.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1">
            <h3>No saved jobs found</h3>
            <p>You haven't bookmarked any jobs yet. Browse the job board to find matches.</p>
            <button onclick="window.location.href='index.html'">Find Jobs</button>
          </div>
        `;
        return;
      }

      grid.innerHTML = jobs.map(job => buildJobCard(job)).join("");
    }

    function buildJobCard(job) {
      const source = job.source || 'Unknown';
      const sourceClass = source.toLowerCase();
      const letter = (job.company || 'J')[0].toUpperCase();
      const colors = {
        'Internshala': '#22c55e',
        'Unstop': '#f97316',
        'Naukri': '#38bdf8',
        'Indeed': '#f472b6'
      };
      const logoBg = colors[source] || '#6c63ff';

      return `
        <div class="job-card" id="card-${job._id}">
          <div class="card-top">
            <div class="company-logo" style="background:${logoBg};color:#fff">
              ${letter}
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="source-badge source-${sourceClass}">
                ${source}
              </span>
              <button class="bookmark-btn saved" onclick="toggleUnsave(event, '${job._id}')" title="Unsave Job">
                <svg class="bookmark-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="job-title">
            ${job.title || 'N/A'}
          </div>
          <div class="company-name">
            ${job.company || 'N/A'} · ${job.location || 'N/A'}
          </div>
          <div class="job-tags">
            <div class="tag">💼 ${job.type || job.duration || 'N/A'}</div>
          </div>
          <div class="card-footer">
            <div class="stipend">
              ${job.stipend || job.salary || 'Not disclosed'}
            </div>
              ${job.job_url ? `<a href="#" onclick="handleApply(event, '${job.job_url}')" class="apply-btn">Apply →</a>` : `<button class="apply-btn" disabled>Not Available</button>`}
          </div>
        </div>
      `;
    }

    async function toggleUnsave(event, jobId) {
      event.stopPropagation();
      const token = localStorage.getItem("jobunify_token");
      
      try {
        const res = await fetch(`${API_BASE_URL}/api/saved/${jobId}`, {
          method: "DELETE",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });
        const data = await res.json();
        
        if (data.success) {
          savedJobs = savedJobs.filter(j => j._id !== jobId);
          // Animate and remove from DOM
          const card = document.getElementById(`card-${jobId}`);
          if (card) {
            card.style.opacity = "0";
            card.style.transform = "scale(0.9)";
            setTimeout(() => {
              renderSavedJobs(savedJobs);
            }, 250);
          } else {
            renderSavedJobs(savedJobs);
          }
        }
      } catch (err) {
        console.error(err);
      }
    }

    function filterSavedJobs() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const filtered = savedJobs.filter(job => 
        (job.title && job.title.toLowerCase().includes(search)) ||
        (job.company && job.company.toLowerCase().includes(search))
      );
      renderSavedJobs(filtered);
    }

    function toggleDropdown(event) {
      event.stopPropagation();
      document.getElementById('profileDropdown').classList.toggle('active');
    }

    function logout(event) {
      event.preventDefault();
      localStorage.removeItem("jobunify_token");
      localStorage.removeItem("jobunify_user");
      window.location.href = "signin.html";
    }

    document.addEventListener("click", () => {
      const dropdown = document.getElementById('profileDropdown');
      if (dropdown) dropdown.classList.remove('active');
    });

    // Gated Apply functionality: require user to be logged in
    function handleApply(event, url) {
      if (event) event.preventDefault();
      const token = localStorage.getItem("jobunify_token");
      console.log("[Apply Clicked] User detected as logged in:", !!token, "Token found:", token ? "Yes" : "No");
      if (token) {
        console.log("[Apply Success] Opening job URL:", url);
        window.open(url, "_blank");
      } else {
        console.log("[Apply Blocked] No token found. Redirecting to signin.html");
        alert("Please login to apply");
        window.location.href = "signin.html";
      }
    }
  </script>
</body>
</html>
