<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings — JobUnify</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .settings-wrap {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      min-height: 70vh;
    }
    .settings-card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(16px);
    }
    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 12px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
    }
    select.form-control {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 16px;
      padding-right: 40px;
      cursor: pointer;
    }
    select.form-control option {
      background: #0f0f23;
      color: #fff;
    }

    /* Switch Styling */
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-top: 1px solid rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      margin-bottom: 24px;
    }
    .switch-label-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .switch-title {
      font-size: 14px;
      font-weight: 600;
    }
    .switch-desc {
      font-size: 12px;
      color: var(--muted);
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 26px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .4s;
      border-radius: 34px;
      border: 1px solid var(--border);
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--accent);
      border-color: var(--accent);
    }
    input:checked + .slider:before {
      transform: translateX(22px);
    }

    .save-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }
    .save-btn:hover {
      background: #5b54db;
    }
    .save-btn:active {
      transform: scale(0.98);
    }
    .msg {
      margin-top: 15px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }
    .msg.success {
      color: #10b981;
    }
    .msg.error {
      color: #ef4444;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">Job<span>Unify</span></div>
    <div class="nav-links">
      <a href="signup.html" id="signupNavBtn"><button class="nav-btn">Sign Up Free</button></a>
      <div class="avatar-wrap" id="avatarWrap" style="display:none">
        <div class="avatar" id="avatarBtn" onclick="toggleDropdown(event)" title="Open menu">S</div>

        <!-- PROFILE DROPDOWN -->
        <div class="profile-dropdown" id="profileDropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar-header" id="sidebar-avatar">S</div>
            <div class="user-text-details">
              <div class="dropdown-username-header" id="sidebar-name">User</div>
              <div class="dropdown-completion-header">
                Profile <span id="profile-completion-bar">0%</span> complete
              </div>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <nav class="dropdown-menu">
            <a href="profile.html" class="dropdown-item">
              <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <span>Profile</span>
            </a>
            <a href="saved-jobs.html" class="dropdown-item">
              <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
              <span>Saved Jobs</span>
            </a>
            <a href="settings.html" class="dropdown-item active">
              <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
              <span>Settings</span>
            </a>
          </nav>

          <div class="dropdown-divider"></div>

          <a href="#" onclick="logout(event)" class="dropdown-item dropdown-signout">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            <span>Sign out</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- SETTINGS CONTAINER -->
  <div class="settings-wrap">
    <div class="settings-card">
        <div class="card-title">Account Settings</div>
      
      <form id="settingsForm" onsubmit="saveSettings(event)">
          <!-- Full Name -->
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required />
          </div>

          <!-- Email Address -->
          <div class="form-group">
            <label for="emailAddr">Email Address</label>
            <input type="email" id="emailAddr" class="form-control" placeholder="Enter your email address" required />
          </div>
          <!-- Change Password Section -->
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <input type="password" id="currentPassword" class="form-control" placeholder="Enter current password" required />
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required />
          </div>
          <div class="form-group">
            <label for="confirmNewPassword">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" class="form-control" placeholder="Confirm new password" required />
          </div>
          

        <button type="submit" class="save-btn">Save Settings</button>
        <div id="settingsMsg" class="msg"></div>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem("jobunify_token");
      if (!token) {
        window.location.href = "signin.html";
        return;
      }

      setupUserSidebar();
      loadSettingsData();
    });

    async function setupUserSidebar() {
      const userStr = localStorage.getItem("jobunify_user");
      if (userStr) {
        const user = JSON.parse(userStr);
        document.getElementById("signupNavBtn").style.display = "none";
        document.getElementById("avatarWrap").style.display = "block";

        const initial = (user.name || "U")[0].toUpperCase();
        document.getElementById("avatarBtn").textContent = initial;
        document.getElementById("sidebar-avatar").textContent = initial;
        document.getElementById("sidebar-name").textContent = user.name || "User";
        
        const completion = user.profileCompletion || 0;
        document.getElementById("profile-completion-bar").textContent = `${completion}%`;
      }
      
      // Async Sync
      const token = localStorage.getItem("jobunify_token");
      if (!token) return;
      try {
        const res = await fetch(`${API_BASE_URL}/api/profile`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success && data.user) {
          const userObj = {
            id: data.user.id,
            name: data.user.name,
            email: data.user.email,
            profileCompletion: data.user.profileCompletion || 0
          };
          localStorage.setItem("jobunify_user", JSON.stringify(userObj));
          
          document.getElementById("profile-completion-bar").textContent = `${userObj.profileCompletion}%`;
          const initial = (userObj.name || "U")[0].toUpperCase();
          document.getElementById("avatarBtn").textContent = initial;
          document.getElementById("sidebar-avatar").textContent = initial;
          document.getElementById("sidebar-name").textContent = userObj.name || "User";
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function loadSettingsData() {
      const token = localStorage.getItem("jobunify_token");
      try {
        const res = await fetch(`${API_BASE_URL}/api/profile`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await res.json();
        
        if (data.success && data.user) {
          document.getElementById("fullName").value = data.user.name || "";
          document.getElementById("emailAddr").value = data.user.email || "";
        }
      } catch (err) {
        console.error("Error loading settings:", err);
      }
    }

    async function saveSettings(e) {
      e.preventDefault();
      const token = localStorage.getItem("jobunify_token");
      const msgEl = document.getElementById("settingsMsg");

      msgEl.className = "msg";
      msgEl.textContent = "Saving...";

      try {
          const name = document.getElementById("fullName").value;
          const email = document.getElementById("emailAddr").value;
          const res = await fetch(`${API_BASE_URL}/api/profile`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ name, email })
          });
        const data = await res.json();

        if (data.success) {
          msgEl.className = "msg success";
          msgEl.textContent = "Settings saved successfully!";
        } else {
          msgEl.className = "msg error";
          msgEl.textContent = data.message || "Failed to save settings.";
        }
      } catch (err) {
        msgEl.className = "msg error";
        msgEl.textContent = "Connection error.";
      }
    }

    function toggleDropdown(event) {
      event.stopPropagation();
      document.getElementById('profileDropdown').classList.toggle('active');
    }

    function logout(event) {
      event.preventDefault();
      localStorage.removeItem("jobunify_token");
      localStorage.removeItem("jobunify_user");
      window.location.href = "signin.html";
    }


    async function updatePassword() {
        const token = localStorage.getItem("jobunify_token");
        const currentPassword = document.getElementById("currentPassword").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmNewPassword = document.getElementById("confirmNewPassword").value;

        if (newPassword !== confirmNewPassword) {
            alert("New passwords do not match");
            return;
        }

        try {
            const res = await fetch(`${API_BASE_URL}/api/profile`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ currentPassword, newPassword })
            });
            const data = await res.json();
            if (data.success) {
                alert("Password updated successfully");
                document.getElementById("currentPassword").value = "";
                document.getElementById("newPassword").value = "";
                document.getElementById("confirmNewPassword").value = "";
            } else {
                alert(data.message || "Failed to update password");
            }
        } catch (err) {
            console.error(err);
            alert("Error updating password");
        }
    }


    document.addEventListener("click", () => {
      const dropdown = document.getElementById('profileDropdown');
      if (dropdown) dropdown.classList.remove('active');
    });
  </script>
</body>
</html>
